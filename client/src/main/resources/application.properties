spring.application.name=client
server.port=8080

server.servlet.session.cookie.name=CLIENT_SESSION

resource-server.demo-uri=http://localhost:9090/demo

# Provider #1: auth-server-jwt
spring.security.oauth2.client.provider.auth-server-jwt.issuer-uri=http://localhost:7070

spring.security.oauth2.client.registration.auth-server-jwt.provider=auth-server-jwt
spring.security.oauth2.client.registration.auth-server-jwt.client-id=client
spring.security.oauth2.client.registration.auth-server-jwt.client-secret=secret
spring.security.oauth2.client.registration.auth-server-jwt.client-name=Auth Server (JWT)
spring.security.oauth2.client.registration.auth-server-jwt.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.auth-server-jwt.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.auth-server-jwt.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.auth-server-jwt.scope=openid,read

# Provider #2: auth-server-opaque
spring.security.oauth2.client.provider.auth-server-opaque.issuer-uri=http://localhost:6060

spring.security.oauth2.client.registration.auth-server-opaque.provider=auth-server-opaque
spring.security.oauth2.client.registration.auth-server-opaque.client-id=client
spring.security.oauth2.client.registration.auth-server-opaque.client-secret=secret
spring.security.oauth2.client.registration.auth-server-opaque.client-name=Auth Server (Opaque)
spring.security.oauth2.client.registration.auth-server-opaque.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.auth-server-opaque.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.auth-server-opaque.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.auth-server-opaque.scope=openid,read
